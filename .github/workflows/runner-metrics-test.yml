name: Runner Metrics Test

on:
  workflow_dispatch:

jobs:
  exercise-runner:
    runs-on: [self-hosted, hetzner-github-runner-11]
    steps:
      - name: Show runner context
        run: |
          echo "RUNNER_NAME=$RUNNER_NAME"
          echo "GITHUB_EVENT_PATH=$GITHUB_EVENT_PATH"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          uname -a
          df -h
      - name: Inspect event path
        run: |
          if [ -n "$GITHUB_EVENT_PATH" ]; then
            echo "event path exists? $(test -f "$GITHUB_EVENT_PATH" && echo yes || echo no)"
            echo "event dir: $(dirname "$GITHUB_EVENT_PATH")"
            ls -la "$(dirname "$GITHUB_EVENT_PATH")" || true
          fi

      - name: Inspect runner temp dirs
        run: |
          ls -la /opt/actions-runner/_work || true
          ls -la /opt/actions-runner/_work/_temp || true
      - name: Create CPU activity
        run: |
          i=0
          while [ $i -lt 2000000 ]; do
            i=$((i+1))
          done

      - name: Create disk activity
        run: |
          mkdir -p /tmp/runner-metrics-test
          dd if=/dev/zero of=/tmp/runner-metrics-test/blob.bin bs=1M count=256

      - name: Hold runner busy
        run: sleep 180

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/runner-metrics-test
